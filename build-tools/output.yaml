                attr: $.context.bap_uri
                _RETURN_: attr are present
              - _NAME_: REQUIRED_CONTEXT_BPP_ID
                attr: $.context.bpp_id
                var_search:
                  - search
                _CONTINUE_: (action all in var_search)
                _RETURN_: attr are present
