              version:
                  - 2.3.0
              _RETURN_:
                  - _NAME_: CONTEXT_REQUIRED
                    _RETURN_:
                        - _NAME_: REQUIRED_CONTEXT_LOCATION_COUNTRY_CODE
                          attr: $.context.location.country.code
                          _RETURN_: attr are present
                        - _NAME_: REQUIRED_CONTEXT_LOCATION_CITY_CODE
