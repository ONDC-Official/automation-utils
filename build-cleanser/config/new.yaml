                                attr: $.message.intent.provider.items[*].xinput.head.descriptor.code
                                _RETURN_: attr are present
                              - _NAME_: REQUIRED_FORM_ID
                                attr: $.message.intent.provider.items[*].xinput.form.id
                                _RETURN_: attr are present

