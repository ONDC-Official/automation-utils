          - api: form
            action_id: fomr1
            action_label: Form1
            description: The borrower receives the KYC form through the link shared by the lender in the previous on_init call. This is a redirection-based form, where the buyer application redirects the borrower to the link provided by the lender to complete the KYC proces
            sequenceDetails:
                - description: >-
                      The lender platform sends the form to collect Know Your Customer
                      (KYC) details from the borrower.
                  mermaid: |-
                      sequenceDiagram
                        title Initializing Order
                        participant Borrower Platform (BAP)
                        participant Lender Platform (BPP)
                        participant Lender Form Service
                        rect rgb(191, 223, 255)
                        Borrower Platform (BAP)->>Lender Form Service: Get Form(KYC)
                        Lender Form Service-->>Borrower Platform (BAP): Form Received
                        Borrower Platform (BAP)->>Lender Form Service: Form Submission
                        Lender Form Service-->>Borrower Platform (BAP): Submission ID
                        end
                        Lender Platform (BPP)->>Borrower Platform (BAP):on_status
                        Borrower Platform (BAP)-->>Lender Platform (BPP): ACK
                        Borrower Platform (BAP)->>Lender Platform (BPP): init(with submissionID)
                        Lender Platform (BPP)-->>Borrower Platform (BAP):ACK
                        Lender Platform (BPP)->>Borrower Platform (BAP):on_init
                        Borrower Platform (BAP)-->>Lender Platform (BPP): ACK
            reference: if any
            examples:
                - name: Example
                  description: Example
                  typ: request
                  payload: "Individual KYC Redirect: This will redirected to different html page"
            mock: {}
          - api: on_status
            action_id: on_status1
            action_label: On Status 1
            unsolicited: true
            description: >-
                The lender sends an unsolicited on_status call to notify the buyer application of the latest order status.
